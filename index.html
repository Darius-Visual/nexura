    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Nexura?",

        },

          "name": "How long does Nexura take to deliver?",
          "acceptedAnswer": { "@type": "Answer", "text": "Nexura delivers the final video in 7 days including scripting, storyboarding, animation, and voiceover." }

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
    /* ... YOUR CSS REMAINS EXACTLY THE SAME ... */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:#07080c;color:#a8b2c4;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    :root{--gold:#d4a843;--gold-light:#e8c06a;--white:#eef1f7;--smoke:#6b7790;--panel:#0e1018;--edge:#181d28;--border:rgba(212,168,67,.15);--radius:6px}
    h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.15;letter-spacing:-0.02em;color:#eef1f7}
    p{line-height:1.8;color:#6b7790}
    a{text-decoration:none;color:inherit}

    /* NAV */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:68px;display:flex;align-items:center;padding:0 5%;background:rgba(7,8,12,.97);border-bottom:1px solid rgba(212,168,67,.15);backdrop-filter:blur(20px)}
    .nb-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.45rem;color:#ffffff;letter-spacing:-0.03em;flex-shrink:0;margin-right:auto}
    .nb-logo .dot{color:#d4a843}
    .nb-links{display:flex;gap:2.5rem;align-items:center;margin-right:2.5rem}
    .nb-links a{font-family:'Inter',sans-serif;font-size:.85rem;font-weight:400;color:#8090a8;transition:color .2s}
    .nb-links a:hover{color:#ffffff}
    .nb-btn{display:inline-flex;align-items:center;gap:.4rem;background:#d4a843;color:#07080c;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;padding:.52rem 1.3rem;border-radius:6px;transition:background .2s,transform .15s;white-space:nowrap}
    .nb-btn:hover{background:#e8c06a;transform:translateY(-1px)}

    /* HERO */
    .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px 6% 5rem;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(212,168,67,.1) 0%,transparent 70%),linear-gradient(180deg,#07080c 0%,#0a0d14 100%)}
    .hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(212,168,67,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,.03) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 75% 55% at 50% 0%,black 30%,transparent 100%)}
    .hero-tag{display:inline-flex;align-items:center;gap:.5rem;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);color:#d4a843;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:.32rem 1rem;border-radius:100px;margin-bottom:2rem;position:relative;z-index:1;animation:up .7s ease both}
    .hero-tag .dot2{width:5px;height:5px;border-radius:50%;background:#d4a843;animation:blink 2s infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .hero h1{font-size:clamp(1.9rem,2.8vw,3rem);font-weight:700;color:#ffffff;max-width:680px;line-height:1.2;position:relative;z-index:1;animation:up .7s .1s ease both}
    .hero h1 .accent{color:#d4a843}
    .hero-sub{font-size:1rem;max-width:510px;margin:1.3rem auto 2.2rem;color:#6b7790;position:relative;z-index:1;animation:up .7s .2s ease both}
    .hero-btns{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;animation:up .7s .3s ease both}
    .btn-gold{background:#d4a843;color:#07080c;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;padding:.8rem 1.8rem;border-radius:6px;transition:background .2s,transform .15s;border:none;cursor:pointer;display:inline-block}
    .btn-gold:hover{background:#e8c06a;transform:translateY(-2px)}
    .btn-outline{background:transparent;color:#eef1f7;font-family:'Syne',sans-serif;font-weight:600;font-size:.92rem;padding:.8rem 1.8rem;border-radius:6px;border:1px solid rgba(238,241,247,.15);transition:border-color .2s,color .2s;cursor:pointer;display:inline-block}
    .btn-outline:hover{border-color:#d4a843;color:#d4a843}
    .hero-stats{display:flex;gap:3.5rem;flex-wrap:wrap;justify-content:center;margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(212,168,67,.1);position:relative;z-index:1;animation:up .7s .4s ease both}
    .stat .num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#d4a843;line-height:1}
    .stat .lbl{font-size:.78rem;color:#6b7790;margin-top:.3rem;letter-spacing:.03em}
    @keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

    /* SECTIONS */
    section{padding:7rem 6%}
    .label{font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#d4a843;display:block;margin-bottom:.9rem;font-family:'Inter',sans-serif}
    .s-title{font-size:clamp(1.7rem,2.6vw,2.5rem);color:#eef1f7;max-width:580px}
    .s-body{font-size:1rem;max-width:520px;margin-top:.9rem;line-height:1.85}

    /* PROBLEM */
    .problem{background:#0e1018}
    .prob-wrap{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1080px;margin:4rem auto 0}
    .prob-card{background:#0a0d14;border:1px solid #181d28;border-radius:10px;padding:2rem;position:relative;overflow:hidden}
    .prob-card::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,67,.06),transparent 70%)}
    .mc{display:flex;align-items:flex-start;gap:.9rem;padding:.9rem 1rem;border-radius:8px;background:rgba(255,255,255,.02);border-left:3px solid;margin-bottom:.7rem}
    .mc.bad{border-color:#b04040}
    .mc.good{border-color:#4caf82}
    .mc-ico{font-size:1rem;margin-top:.1rem;flex-shrink:0}
    .mc strong{display:block;color:#eef1f7;font-size:.88rem;font-weight:500;margin-bottom:.2rem}
    .mc span{font-size:.8rem;color:#6b7790}

    /* SOLUTION */
    .solution{background:#07080c}
    .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:1080px;margin:3.5rem auto 0}
    .step{background:#0e1018;border:1px solid #181d28;border-radius:10px;padding:2rem;transition:border-color .3s,transform .3s}
    .step:hover{border-color:rgba(212,168,67,.25);transform:translateY(-4px)}
    .step-n{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:rgba(212,168,67,.1);margin-bottom:.8rem;line-height:1}
    .step h3{font-size:.98rem;color:#eef1f7;margin-bottom:.5rem}
    .step p{font-size:.88rem}
    .step-pill{display:inline-block;margin-top:1rem;background:rgba(212,168,67,.08);color:#d4a843;font-size:.72rem;font-weight:600;padding:.22rem .7rem;border-radius:100px;letter-spacing:.05em}

    /* WHO */
    .who{background:#0e1018}
    .who-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:3.5rem;max-width:1080px}
    .wc{background:#0a0d14;border:1px solid #181d28;border-radius:10px;padding:1.4rem;text-align:center;transition:border-color .3s}
    .wc:hover{border-color:rgba(212,168,67,.2)}
    .wc-ico{font-size:1.6rem;margin-bottom:.6rem}
    .wc h4{font-size:.9rem;color:#eef1f7;margin-bottom:.35rem}
    .wc p{font-size:.8rem}

    /* PROCESS */
    .process{background:#07080c}
    .proc-list{max-width:760px;margin:3.5rem auto 0}
    .ps{display:flex;gap:1.8rem;padding:1.8rem 0;border-bottom:1px solid #181d28}
    .ps:last-child{border-bottom:none}
    .ps-n{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#d4a843;flex-shrink:0;width:32px;padding-top:.1rem}
    .ps h3{font-size:.98rem;color:#eef1f7;margin-bottom:.35rem}
    .ps p{font-size:.88rem}
    .ps-pill{display:inline-block;margin-top:.5rem;background:rgba(212,168,67,.08);color:#d4a843;font-size:.72rem;font-weight:600;padding:.2rem .65rem;border-radius:100px}

    /* GUARANTEE */
    .guarantee{background:linear-gradient(135deg,rgba(212,168,67,.07),#0e1018);border-top:1px solid rgba(212,168,67,.12);border-bottom:1px solid rgba(212,168,67,.12)}
    .g-inner{max-width:640px;margin:0 auto;text-align:center}
    .g-badge{display:inline-block;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);color:#d4a843;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;padding:.32rem 1.1rem;border-radius:100px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.4rem}
    .g-inner h2{font-size:clamp(1.5rem,2.4vw,2.2rem);color:#eef1f7;margin-bottom:.9rem}

    /* CONTACT */
    .contact-sec{background:#0e1018}
    .contact-inner{max-width:620px;margin:0 auto;text-align:center}
    .contact-inner h2{font-size:clamp(1.6rem,2.6vw,2.4rem);color:#eef1f7;margin-bottom:.9rem}
    .call-card{background:linear-gradient(135deg,rgba(212,168,67,.1),rgba(212,168,67,.04));border:1px solid rgba(212,168,67,.28);border-radius:12px;padding:2.5rem;margin-top:2.5rem;text-align:center}
    .call-icon{font-size:2.2rem;margin-bottom:.9rem}
    .call-card h3{font-size:1.25rem;color:#eef1f7;margin-bottom:.6rem}
    .call-card p{font-size:.92rem;max-width:420px;margin:0 auto}
    .call-note{font-size:.78rem;color:#6b7790;margin-top:.8rem}
    .divider{display:flex;align-items:center;gap:1rem;margin:2.2rem 0;color:#6b7790;font-size:.82rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#181d28}
    .form-wrap{background:#0a0d14;border:1px solid #181d28;border-radius:12px;padding:2.5rem;text-align:left}
    .form-hint{font-size:.82rem;color:#6b7790;margin-bottom:1.6rem;padding-bottom:1.4rem;border-bottom:1px solid #181d28;text-align:center}
    .form-hint a{color:#d4a843;font-weight:500}
    .fg{margin-bottom:1.2rem}
    .fg label{display:block;font-size:.8rem;font-weight:500;color:#a8b2c4;margin-bottom:.4rem;letter-spacing:.01em}
    .fg input,.fg textarea,.fg select{width:100%;background:#111520;border:1px solid rgba(255,255,255,.07);color:#eef1f7;font-family:'Inter',sans-serif;font-size:.92rem;padding:.78rem 1rem;border-radius:6px;outline:none;transition:border-color .2s;-webkit-appearance:none}
    .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:rgba(212,168,67,.4)}
    .fg input::placeholder,.fg textarea::placeholder{color:#3d4557}
    .fg select{cursor:pointer}
    .fg select option{background:#111520}
    .fg textarea{resize:vertical;min-height:88px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .f-btn{width:100%;background:#d4a843;color:#07080c;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;padding:.95rem;border-radius:6px;border:none;cursor:pointer;margin-top:.4rem;transition:background .2s,transform .15s;letter-spacing:.01em}
    .f-btn:hover{background:#e8c06a;transform:translateY(-1px)}
    .f-note{font-size:.76rem;text-align:center;color:#6b7790;margin-top:.8rem}
    .direct{text-align:center;margin-top:1.4rem;font-size:.88rem;color:#6b7790}
    .direct a{color:#d4a843;border-bottom:1px solid rgba(212,168,67,.25);transition:border-color .2s}
    .direct a:hover{border-color:#d4a843}

    /* FOOTER */
    footer{background:#07080c;border-top:1px solid #181d28;padding:2.5rem 6%;display:flex;align-items:center;flex-wrap:wrap;gap:1.5rem;justify-content:space-between}
    .f-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:#ffffff;letter-spacing:-0.02em}
    .f-logo .dot{color:#d4a843}
    .f-links{display:flex;gap:2rem;flex-wrap:wrap}
    .f-links a{font-size:.82rem;color:#6b7790;transition:color .2s}
    .f-links a:hover{color:#d4a843}
    .f-contact{display:flex;gap:1rem;align-items:center}
    .f-email{font-size:.82rem;color:#d4a843}
    .f-email:hover{opacity:.75}
    .f-cbtn{background:#d4a843;color:#07080c;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;padding:.4rem 1rem;border-radius:6px;transition:background .2s}
    .f-cbtn:hover{background:#e8c06a}
    .f-copy{width:100%;text-align:center;font-size:.77rem;color:#3d4557;padding-top:1.5rem;border-top:1px solid #181d28}

    /* REVEAL */
    .r{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
    .r.in{opacity:1;transform:none}

    @media(max-width:960px){.prob-wrap,.steps{grid-template-columns:1fr}.who-grid{grid-template-columns:repeat(2,1fr)}.nb-links{display:none}.form-row{grid-template-columns:1fr}}
    @media(max-width:560px){.hero-stats{gap:2rem}section{padding:5rem 5%}.who-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <nav class="navbar">
      <div class="nb-logo">NEXURA<span class="dot">.</span></div>
      </nav>

    <script>
    const els=document.querySelectorAll('.r');
    const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')})},{threshold:0.1});
    els.forEach(el=>io.observe(el));
    </script>
</body>
</html>
